# RNS TCP Client Interface — for remote nodes and workstations
#
# Append this to ~/.reticulum/config on each client node.
# All clients dial outbound to the hub — no port-forwarding required.
#
# Replace HUB_IP with your hub node's Tailscale IP and HUB_PORT with your chosen port.

[[RNS TCP Client]]
  type = TCPClientInterface
  enabled = yes
  target_host = HUB_IP
  target_port = HUB_PORT
