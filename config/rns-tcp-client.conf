# RNS TCP Client Interface — for Pi3 (Vandine) and ThinkStation
#
# Append this to ~/.reticulum/config on each client node.
# Pi3 and ThinkStation both dial outbound to Pi2's Tailscale IP.
# No port-forwarding required at either site.
#
# Pi2 Tailscale IP: 100.111.113.35  Port: 4242

[[RNS TCP Client]]
  type = TCPClientInterface
  enabled = yes
  target_host = 100.111.113.35
  target_port = 4242
