# RNS TCP Server Interface — for the hub node
#
# Append this to ~/.reticulum/config on your hub.
# Binds on all interfaces; restrict to your VPN subnet via firewall.
#
# Replace HUB_PORT with your chosen port (e.g. 4242).
#
# After appending, restart rnsd:
#   systemctl --user restart rnsd
#
# Firewall rule (restrict to VPN subnet — adjust interface and subnet as needed):
#   sudo ufw allow in on tailscale0 to any port HUB_PORT proto tcp
#   sudo ufw deny HUB_PORT

[[RNS TCP Hub]]
  type = TCPServerInterface
  enabled = yes
  listen_ip = 0.0.0.0
  listen_port = HUB_PORT
