# RNS TCP Server Interface — for Pi2 (hub)
#
# Append this to ~/.reticulum/config on Pi2.
# Binds on all interfaces; UFW restricts to Tailscale subnet (100.64.0.0/10).
#
# After appending, restart rnsd:
#   systemctl --user restart rnsd
#
# UFW rule (run once on Pi2):
#   sudo ufw allow in on tailscale0 to any port 4242 proto tcp
#   sudo ufw deny 4242

[[RNS TCP Hub]]
  type = TCPServerInterface
  enabled = yes
  listen_ip = 0.0.0.0
  listen_port = 4242
